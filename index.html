<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sticky</title>
<meta name="theme-color" id="themeColorMeta" content="#fff4a3" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="sheet" id="sheet">
    <div class="note-body" id="noteBody" contenteditable="plaintext-only" spellcheck="true" autofocus></div>

    <button class="corner-btn" id="cornerBtn" aria-label="Customize" title="Customize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="19" r="1.4"/>
      </svg>
    </button>

    <div class="panel" id="panel" aria-hidden="true">

      <!-- Color -->
      <div class="panel-row">
        <span class="panel-label">Color</span>
        <label class="color-wheel-btn" id="colorWheelBtn" title="Pick color">
          <input type="color" id="customColorInput" />
          <div class="color-wheel-preview" id="colorWheelPreview"></div>
          <svg class="wheel-icon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        </label>
      </div>

      <div class="panel-divider"></div>

      <!-- Font -->
      <div class="panel-row">
        <span class="panel-label">Font</span>
        <div class="font-chips" id="fontGrid"></div>
      </div>

      <div class="panel-divider"></div>

      <!-- Size -->
      <div class="panel-row">
        <span class="panel-label">Size</span>
        <div class="size-row">
          <input type="range" min="12" max="28" step="1" id="fontSize" />
          <span class="size-readout" id="fontSizeValue">15</span>
        </div>
      </div>

      <div class="panel-divider"></div>

      <!-- Controls -->
      <div class="panel-row">
        <button class="mini-btn" id="boldBtn" title="Bold (⌘B)"><b>B</b></button>
        <button class="mini-btn" id="italicBtn" title="Italic (⌘I)"><i>I</i></button>
        <div class="mini-spacer"></div>
        <button class="mini-btn" id="themeBtn" title="Toggle theme">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
